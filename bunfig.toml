# Bun test + coverage configuration for claude-zig-quality.
#
# Coverage is the measurable target of the test-coverage drive (see the
# 322-test plan). Thresholds start at the current baseline and ratchet up as
# each task-group lands; CI fails the per-PR tier if coverage regresses.
[test]
coverage = true
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
# Only count our own source as coverable (not the test files themselves).
coverageSkipTestFiles = true

# Ratchet: raise these toward 100 as task-groups land. The aggregate is held
# down by subprocess-tested files (hooks + verify-* orchestrators whose main()
# runs in child processes invisible to in-process instrumentation; the plan
# explicitly says NOT to gate on those). Unit-tested pure libs are already high
# (files.ts 96%, zig.ts 72%). Wave 2 (fake-ZLS drain, orchestrator DI) lifts the
# remaining big gaps (zls.ts, verify-*.ts).
# After Wave 1 (2026-06-22): ~42% lines / ~44% funcs aggregate.
[test.coverageThreshold]
line = 0.40
function = 0.43
